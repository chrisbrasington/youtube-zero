services:
  youtube-zero:
    build: .
    ports:
      - "8000:8000"
    labels:
      homepage.group: Apps
      homepage.name: YouTube Zero
      homepage.icon: youtube
      homepage.href: http://__host__:8000
      homepage.description: Notify Signal on new YouTube videos
      homepage.server: my-docker
      homepage.container: youtube-zero-youtube-zero-1
    volumes:
      - ./data:/data:Z  # database persisted to ./data/youtube_zero.db on the host
    environment:
      DB_PATH: /data/youtube_zero.db
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY:-}
      SIGNAL_API_URL: ${SIGNAL_API_URL:-http://signal-api:8080}
      REFRESH_INTERVAL_SECONDS: ${REFRESH_INTERVAL_SECONDS:-3600}  # 0 = disabled, >0 = enabled (fires at top of every hour)
      TZ: ${TZ:-America/Denver}  # for quiet hours (see below)
      QUIET_HOURS_START: ${QUIET_HOURS_START:-0}  # midnight
      QUIET_HOURS_END: ${QUIET_HOURS_END:-6}      # 6am — skip refresh between these hours
      ADB_API_URL: ${ADB_API_URL:-http://adb-api:8080}
    restart: unless-stopped

  adb-api:
    build: ./adb-api
    volumes:
      - ./adb-data:/root/.android:Z  # persists ADB keys + accepted-device list
    restart: unless-stopped
    labels:
      homepage.group: Apps
      homepage.name: ADB API
      homepage.icon: mdi-android
      homepage.description: ADB shim for YouTube Zero
      homepage.server: my-docker
      homepage.container: youtube-zero-adb-api-1

  signal-api:
    image: bbernhard/signal-cli-rest-api:latest
    environment:
      - MODE=json-rpc
    volumes:
      - ./signal-data:/home/.local/share/signal-cli:z
    restart: unless-stopped
    labels:
      homepage.group: Apps
      homepage.name: Signal API
      homepage.icon: signal
      homepage.description: Signal REST gateway
      homepage.server: my-docker
      homepage.container: youtube-zero-signal-api-1
