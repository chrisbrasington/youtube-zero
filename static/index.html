<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube Zero</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="app">

  <header class="header">
    <div class="header-left">
      <h1 class="logo">▶ YouTube Zero</h1>
      <span id="all-clear-badge" class="all-clear-badge hidden">✓ all caught up</span>
    </div>
    <div class="header-right">
      <div class="quota-pill" id="quota-display" title="YouTube API quota">
        <span class="quota-label">api</span>
        <span id="quota-today" class="quota-ok">—</span>
      </div>
      <div class="auto-refresh" title="Auto-refresh interval">
        <input type="checkbox" id="auto-refresh-check" checked>
        <label for="auto-refresh-check" class="auto-refresh-label">Auto</label>
        <input type="range" id="auto-refresh-slider"
               min="0" max="8" step="1" value="3"
               list="refresh-ticks">
        <datalist id="refresh-ticks">
          <option value="0"><option value="1"><option value="2"><option value="3">
          <option value="4"><option value="5"><option value="6"><option value="7"><option value="8">
        </datalist>
        <span id="auto-refresh-interval" class="auto-refresh-interval">30m</span>
        <span id="auto-refresh-countdown" class="auto-refresh-countdown"></span>
      </div>
      <button class="btn-ghost" id="btn-refresh-all" title="Refresh all channels">
        <span id="refresh-spinner" class="spinner hidden">↻</span>
        <span id="refresh-label">↻ Refresh All</span>
      </button>
      <button class="btn-queue" id="btn-queue">
        Queue <span class="queue-badge" id="queue-badge">0</span>
      </button>
      <button class="btn-danger" id="btn-clear-all" title="Mark everything as read">☢ Clear All</button>
      <button class="btn-icon" id="btn-settings" title="Settings">⚙</button>
    </div>
  </header>

  <div id="settings-panel" class="settings-panel hidden">
    <div class="settings-inner">
      <strong>YouTube Data API v3 Key</strong>
      <div class="settings-row">
        <input type="password" id="api-key-input" placeholder="AIza…" autocomplete="off">
        <button class="btn-primary" id="btn-save-key">Save</button>
      </div>
      <div class="settings-hint">
        <a href="https://console.cloud.google.com/apis/library/youtube.googleapis.com" target="_blank" rel="noopener">
          Get free key
        </a>
        — Google Cloud Console → Enable YouTube Data API v3 → Credentials → API key
      </div>
      <div id="api-key-status" class="api-key-status"></div>
    </div>
  </div>

  <div class="main-layout" id="main-layout">

    <div class="channels-pane" id="channels-pane">
      <div class="add-bar">
        <input type="text" id="channel-input"
               placeholder="Add channel: youtube.com/@handle, @RetroGameCorps, or channel name"
               autocomplete="off">
        <button class="btn-primary" id="btn-add-channel">Add</button>
        <button class="btn-ghost" id="btn-new-folder" title="Create a new folder">📁 New Folder</button>
      </div>
      <div class="toolbar">
        <div id="status-msg" class="status-msg"></div>
        <button class="btn-sort" id="btn-sort" title="Toggle sort order">↕ Manual order</button>
      </div>
      <div id="channels-list"></div>
    </div>

    <div class="queue-pane hidden" id="queue-pane">
      <div class="queue-header">
        <span class="queue-title">Watch Queue</span>
        <button class="btn-icon" id="btn-close-queue">✕</button>
      </div>
      <div id="queue-list" class="queue-list"></div>
    </div>

  </div>

  <!-- Icon picker popup -->
  <div id="icon-picker" class="icon-picker hidden">
    <input type="text" id="icon-search" placeholder="Search icons…" autocomplete="off">
    <div id="icon-grid" class="icon-grid"></div>
  </div>

  <!-- Player overlay -->
  <div id="player-overlay" class="player-overlay hidden" data-action="close-player-backdrop">
    <div id="player-box" class="player-box" onclick="event.stopPropagation()">
      <div class="player-header">
        <span id="player-title" class="player-title"></span>
        <button class="btn-icon player-btn" id="btn-player-watched" title="Mark watched &amp; close">✓ Watched</button>
        <a id="player-yt-link" class="btn-icon player-btn" href="#" target="_blank" rel="noopener noreferrer" title="Open in YouTube">↗</a>
        <button class="btn-icon player-btn" id="btn-player-theater" title="Toggle theater mode">⬜</button>
        <button class="btn-icon player-btn" id="btn-player-fullscreen" title="Fullscreen">⛶</button>
        <button class="btn-icon player-btn" id="btn-player-close" title="Close">✕</button>
      </div>
      <iframe id="player-frame" class="player-frame"
              allow="autoplay; fullscreen; picture-in-picture"
              allowfullscreen></iframe>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
